name: CI - Build Test Docker Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: budgetmanageracr.azurecr.io
  IMAGE_NAME: budgetmanager

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/BudgetManager.Tests/BudgetManager.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Docker Build
        run: | 
            docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \ 
                         -t $REGISTRY/$IMAGE_NAME:latest .
        
      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.ACR_USERNAME}} --password-stdin

      - name: Push image
        run: |
            docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
            docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
